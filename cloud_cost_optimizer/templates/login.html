{% extends 'base.html' %}

{% block content %}
<div style="max-width: 400px; margin: 0 auto; margin-top: 4rem;">
    <div class="card">
        <h2 class="text-center mb-2">Welcome Back</h2>
        <p class="text-center text-muted" style="margin-bottom: 2rem;">Sign in to your account to monitor cloud costs.</p>
        
        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" id="email" name="email" class="form-control" required placeholder="you@example.com">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" required placeholder="••••••••">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign In</button>
        </form>
        
        <p class="text-center mt-4" style="font-size: 0.9rem;">
            Don't have an account? <a href="{{ url_for('register') }}" style="color: var(--primary); text-decoration: none; font-weight: 600;">Sign up</a>
        </p>
    </div>
</div>
{% endblock %}
